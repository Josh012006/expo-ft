# configs/task/maniskill/push_cube.yaml

# ── Environment ────────────────────────────────────────────────
env_id: "PushCube-v1"
language_instruction: "push the cube to the goal region"
control_hz: 10
max_episode_steps: 120
env_type: "sim"
env_wrapper: "maniskill"
sim_backend: "physx_cpu"

# Control mode config
control_mode: "pd_joint_delta_pos"
normalize_action: true
use_cartesian_state: false
output_action_dim: 8

# Observation config
state_obs_key: "observation/joint_position"
state_obs_dim: 7

# ── Data ───────────────────────────────────────────────────────
lerobot_repo_id: "expo_ft/push_cube"
droid_format_dir: "demos/PushCube-v1/droid_format"
action_space: "joint_position"
gripper_action_space: "position"
num_data: 0
skip_repack_transforms: true
camera_width: 128
camera_height: 128

# ── Run / Logging ──────────────────────────────────────────────
project_name: "expo-ft"
run_name: "push_cube_expo_ft"
output_dir: "logs/push_cube"
resume_dir: null

# ── Algorithm ──────────────────────────────────────────────────
model_cls: "EXPOLearner"
seed: 42
max_episodes: 1000
max_steps_per_episode: 120
batch_size: 64
utd_ratio: 20
offline_ratio: 0.0
update_type: "episode"
num_updates: 1
num_batch: 1
replan_steps: 8
fsdp_devices: 1

# ── Checkpointing ──────────────────────────────────────────────
checkpoint_model: true
checkpoint_interval: 100
checkpoint_buffer: false
keep_period: 10000

# ── SFT warmup ─────────────────────────────────────────────────
sft_exp_name: "push_cube_sft"
sft_num_workers: 12
sft_num_train_steps: 4000
sft_batch_size: 64
sft_use_lora: true
sft_peak_lr: 2.5e-5
sft_save_interval: 200
sft_log_interval: 100
sft_resume: false

# ── RL hyperparameters (EXPOLearner) ───────────────────────────
rl_lr: 3e-4
rl_discount: 0.99
rl_tau: 0.005
rl_alpha: 0.1
rl_hidden_dims: [256, 256]
rl_edit_action_scale: 0.05
actor_success_only: false
