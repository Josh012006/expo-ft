# configs/task/maniskill/push_cube.yaml

# ── Environment ────────────────────────────────────────────────
env_id: "PushCube-v1"
language_instruction: "push the cube to the goal region"
control_hz: 10
max_episode_steps: 120
env_type: "sim"  # "sim" for simulation, "droid" for real robot
env_wrapper: "maniskill"  # "maniskill" ou "droid" (real robot)
sim_backend: "physx_cpu"

# Control mode config
control_mode: "pd_joint_delta_pos"
normalize_action: true
use_cartesian_state: false
output_action_dim: 8
action_space: "joint_position" # Action space keys for DROID format reader
gripper_action_space: "position"

# Observation config
state_obs_key: "observation/joint_position"
state_obs_dim: 7

# Camera config
camera_width: 224
camera_height: 224
camera_eye_pos: [0.6, 0.7, 0.6]      # default is [0.3, 0, 0.6]
camera_target_pos: [0.0, 0.0, 0.35]  # default is [-0.1, 0, 0.1]
camera_fov: 1.0
robot_uids: "panda_wristcam"


# ── Data ───────────────────────────────────────────────────────
# How many successful demo episodes to GENERATE via motion planning
# (--stage demos, a one-time upfront step). Different from num_data_sft/
# num_data_rl below, which control how many of these to LOAD for SFT/RL.
num_demos_generate: 550
lerobot_repo_id: "expo_ft/push_cube"
droid_format_dir: "demos/PushCube-v1/droid_format"
# Skip RepackTransform in replay buffer — our observations already have the
# correct keys for DroidInputs (observation/cartesian_position, etc.)
skip_repack_transforms: true


# ── Run / Logging ──────────────────────────────────────────────
project_name: "expo-ft"
run_name: "push_cube_expo_ft"
output_dir: "logs/push_cube"  # a timestamped subdir is created automatically per run


# ── SFT warmup ─────────────────────────────────────────────────
sft_exp_name: "push_cube_sft"
sft_num_workers: 12
sft_num_train_steps: 4000
sft_batch_size: 64
sft_use_lora: true         # use LoRA fine-tuning (faster, less memory than full fine-tune)
sft_peak_lr: 2.5e-5
sft_save_interval: 200
sft_log_interval: 100
sft_resume: false
sft_resume_dir: null
num_data_sft: 50


# ── RL Algorithm ──────────────────────────────────────────────────
model_cls: "EXPOLearner"  
seed: 42
max_episodes: 1000
max_steps_per_episode: 120
batch_size: 24             # number of transitions sampled from replay buffer per gradient update
utd_ratio: 2              # gradient updates performed per new transition collected
offline_ratio: 0.5         # fraction of batch from offline demo buffer (0 = demos inserted into online buffer)
update_type: "episode"     # when to trigger updates: "episode", "step", or "batch"
num_updates: 1             # number of gradient updates per trigger
num_batch: 1               # number of episodes to accumulate before updating (only used when update_type="batch")
replan_steps: 8            # number of actions to execute from each action chunk before replanning (action_horizon=16)
fsdp_devices: 1            # number of GPUs for FSDP sharding (1 = single GPU, no sharding)

num_data_rl: 50
rl_resume_dir: null

# ── RL Checkpointing ──────────────────────────────────────────────
checkpoint_model: true
checkpoint_interval: 1000  # save checkpoint every N steps (0 = only save at end)
checkpoint_buffer: false   # save replay buffer transitions to disk at each step
keep_period: 20000         # keep one checkpoint every N steps (older ones are deleted)
max_to_keep: 1


# ── RL hyperparameters (EXPOLearner) ───────────────────────────
rl_lr: 3.0e-4                     # learning rate for critic and edit policy
rl_discount: 0.99               # discount factor gamma for Bellman backup
rl_tau: 0.005                   # polyak averaging coefficient for target network soft update
rl_init_temperature: 1.0        # initial entropy temperature (controls exploration vs exploitation)
rl_adjust_target_entropy: true   # if true, target entropy accounts for edit_scale's log-Jacobian
                                  # correction (target = -action_dim/2 + action_dim*log(edit_scale));
                                  # if false, this correction is omitted, which can badly miscalibrate
                                  # the entropy target when edit_scale is far from 1 (was false, alpha
                                  # grew unbounded chasing an uncorrected target — see July 2026 notes)
rl_hidden_dims: [256, 256, 256] # hidden layer sizes for critic and edit policy MLPs
rl_fixed_temperature: null      # if set (e.g. 0.1), bypasses the learned SAC
                                  # temperature entirely — a diagnostic Jesse suggested
                                  # to test whether the unconverged/climbing alpha itself
                                  # contributes to instability (see July 2026 notes)
rl_edit_scale: 0.05              # max magnitude of residual action added by edit policy
rl_critic_weight_decay: null    # if set (e.g. 1.0e-4), L2 weight decay on critic + encoder params (adamw)
rl_critic_grad_clip_norm: null  # if set (e.g. 1.0), clips critic + encoder grads to this global norm
rl_freeze_critic_encoder: false # if true, ResNet-34 image encoder frozen for the critic (Q uses embeddings only)
actor_success_only: true        # if true, actor batch is sampled only from successful transitions
