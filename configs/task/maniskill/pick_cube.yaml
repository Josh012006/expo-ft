# configs/task/maniskill/pick_cube.yaml

# ── Environment ────────────────────────────────────────────────
env_id: "PickCube-v1"
language_instruction: "pick up the red cube and bring it to the green point"
control_hz: 10
max_episode_steps: 120
env_type: "sim"
env_wrapper: "maniskill"
sim_backend: "physx_cpu"

# Control mode config
control_mode: "pd_joint_delta_pos"
normalize_action: true
use_cartesian_state: false
output_action_dim: 8

# Observation config
state_obs_key: "observation/joint_position"
state_obs_dim: 7

# ── Data ───────────────────────────────────────────────────────
lerobot_repo_id: "expo_ft/pick_cube"
droid_format_dir: "demos/PickCube-v1/droid_format"
action_space: "joint_position"
gripper_action_space: "position"
num_data: 0
skip_repack_transforms: true

# Camera config
camera_width: 224
camera_height: 224
camera_eye_pos: [0.6, 0.7, 0.6]      # default is [0.3, 0, 0.6]
camera_target_pos: [0.0, 0.0, 0.35]  # default is [-0.1, 0, 0.1]
camera_fov: 1.0
robot_uids: "panda_wristcam"


# ── Run / Logging ──────────────────────────────────────────────
project_name: "expo-ft"
run_name: "pick_cube_expo_ft"
output_dir: "logs/pick_cube"
resume_dir: "logs/pick_cube/pick_cube_expo_ft_2026-07-05_01-06-12"

# ── Algorithm ──────────────────────────────────────────────────
model_cls: "EXPOLearner"
seed: 42
max_episodes: 1000
max_steps_per_episode: 120
batch_size: 24
utd_ratio: 10
offline_ratio: 0.0
update_type: "episode"
num_updates: 1
num_batch: 1
replan_steps: 8
fsdp_devices: 1

# ── RL Checkpointing ──────────────────────────────────────────────
checkpoint_model: true
checkpoint_interval: 1000
checkpoint_buffer: false
keep_period: 40000
max_to_keep: 2

# ── SFT warmup ─────────────────────────────────────────────────
sft_exp_name: "pick_cube_sft"
sft_num_workers: 12
sft_num_train_steps: 4000
sft_batch_size: 64
sft_use_lora: true
sft_peak_lr: 2.5e-5
sft_save_interval: 200
sft_log_interval: 100
sft_resume: true

# ── RL hyperparameters (EXPOLearner) ───────────────────────────
rl_lr: 3e-4
rl_discount: 0.99
rl_tau: 0.005
rl_alpha: 0.1
rl_hidden_dims: [256, 256]
rl_edit_action_scale: 0.05
actor_success_only: false
